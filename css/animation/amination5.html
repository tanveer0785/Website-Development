<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .box{
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 70px;
            color: blue;
            background-image: url(./download\ \(1\).jpg);
            width: 300px;
            height: 300px;
            background-color: brown;
            animation: box 5s linear 5 ;
        }
        @keyframes box {
            0%{
                transform: translate(0);
                background-color: yellow;
            }
            25%{
                transform: translateX(1000px);
                background-color: tomato;
                border-radius: 30px;
            }
            50%{
                transform: translateX(1000px) translateY(300px) rotate(360deg);
                background-color: slateblue;
                 border-radius: 50px;
            } 
            75%{
                  transform: translateX(0px) translateY(300px) scale(0.9);
                background-color:red;
                 border-radius: 80px;
            }
            100%{
                transform: translateX(0) translateY(0);
                background-color: green;
                 border-radius: 100px;
            }
                
                
                
                
         
            }
            
      
    </style>
</head>
<body>
    <div class="box">Devolper</div>
</body>
</html>
