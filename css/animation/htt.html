<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            position:absolute;
            width: 100%;
            height: 100vh;
        }
        .nav{
            position: absolute;
            top: 0;
            width: 100%;
            height: 100px;
            background-color: blue;
        }
        .hero{
            width: 100%;
            height: 100vh;
            background-color: brown;
        }
        .outer{
            position: relative;
             bottom: 30px;
            width: 500px;
            height: 600px;
            background-color: yellow;
        }
        .box{
            position: absolute;
            bottom: 10px;
            right:30px ;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: coral;
        }
    </style>
</head>
<body>
    <div class="nav"></div>
    <div class="hero"></div>
    <div class="outer">

        <div class="box"></div>
    </div>
</body>
</html>
