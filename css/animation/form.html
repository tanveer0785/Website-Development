<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h2>Allow Maltiple Selections</h2>
    <p>
      Use the multiple attribute to allow the user to select more than one
      value.
    </p>
    <form action="./abdul kalam.html">
        <label for="Cars">Choose a cars:</label>
        <select id="Cars"name="Cars"size="4"Maltiple>
            <option value="volvo">Volvo</option>
            <option value="Cultus">Cultus</option>
            <option value="Alto">Alto</option>
            <option value="Honda">Honda</option>
        </select><br><br>
        <input type="submit">
    </form>
    <p>Hold down the Ctrl (windows) / Command (Mac) button to select multiple options</p>
</body>
</html>
