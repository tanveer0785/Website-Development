<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .box{
            width: 100px;
            height: 100px;
            background-color: crimson;
            animation: move 2s linear 3 ;
        }

       @keyframes move {

        to{
            transform: translate(300px)rotate(30deg) ;
        }
        from{
            transform: translate(0px) rotate(30deg)  ;
        }
       }

    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
