<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        position: relative;
        width: 300px;
        height: 200px;
        background: #eee;
      }
      body{
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 300px;
      }

      .box {
        position: absolute;
        bottom: 20px;
        left: 0px;
        background: lightcoral;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">Absolute Position</div>
    </div>
  </body>
</html>
