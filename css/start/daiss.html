<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .main{
            width: 100%;
            height: 100vh;
            background-color:orangered;
            display: flex;
            align-items: center;
            justify-content: space-evenly;
        }
        .box{
            width: 150px;
            height: 150px;
            
        }
        .box1{
            background-color: yellow;
            display: flex;
            justify-content: center;
            align-items: center;
            color: tomato;
            font-size: 50px;
        }
        .box2{
             background-color:red;
              display: flex;
            justify-content: center;
            align-items: center;
            color: yellow;
             font-size: 50px;
        }
        .box3{
             background-color:brown;
              display: flex;
            justify-content: center;
            align-items: center;
            color: red;
             font-size: 50px;
        }
        .box4{
             background-color:green;
              display: flex;
            justify-content: center;
            align-items: center;
            color: peru;
             font-size: 50px;
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="box box1">hello</div>
        <div class="box box2">hello</div>
        <div class="box box3">hello</div>
        <div class="box box4">hello</div>
    </div>
</body>
</html>
