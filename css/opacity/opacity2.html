<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .main{
         display: flex;
         justify-content: center;
         align-items: center;
         cursor: pointer;
        }
        .box1{
            opacity: 0.9;
            font-style: italic;
            font-size: 30px;
             display: flex;
             color: blue;
         justify-content: center;
         align-items: center;
            width: 200px;
            height: 200px;
            background-color: aqua;
        }
        .box2{
            opacity: 0.7;
            font-style: italic;
             font-size: 30px;
             display: flex;
             color: violet;
         justify-content: center;
         align-items: center;
            width: 200px;
            height: 200px;
            background-color: red; 
        }
        .box3{
            opacity: 0.6;
            font-style: italic;
             font-size: 30px;
             display: flex;
             color: yellow;
         justify-content: center;
         align-items: center;
            width: 200px;
            height: 200px;
            background-color: gray; 
        }
        .box4{
            opacity: 0.4;
            font-style: italic;
             font-size: 30px;
             display: flex;
         justify-content: center;
         color: teal;
         align-items: center;
            width: 200px;
            height: 200px;
            background-color:cornflowerblue; 
        }
        .box1:hover{
            background-color: brown;
            cursor: pointer;

        }
        .box{
            opacity: 0.5;
            transition: all 0.5s;
        }
        .box:hover{
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="box1 box">WEB</div>
        <div class="box2 box">DEVOLPER</div>
        <div class="box3 box">MUHAMMAD</div>
        <div class="box4 box">TANVEER</div>
    </div>
</body>
</html>
