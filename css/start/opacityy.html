        }

        }
        .box3{

            height: 100px;
            background-color:rgba(0, 128, 0, 0.58);
        }
        .box4{
            width: 300px;
            height: 100px;
            background-color:rgba(0, 128, 0, 0.208);
        }
        
    </style>
</head>
<body>
    <div class="main">

        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
        <div class="box4"></div>
        
    </div>

</html>
