<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .box{
            width: 300px;
            height: 200px;
            background-color: rgba(0, 255, 0, 0.9);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0.5; 
        }
        h2{
            font-size: 46px;
            color: red;
        }
    </style>
</head>
<body>
    
    <div class="box">
        <h2>Hello</h2>
    </div>
</body>
</html>
