<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .main{
            display: flex;
            justify-content: center;
            align-items: center;
        }
         .box1 h1 {
            opacity: 0.9;
           position: absolute;
           display: flex;
           justify-content: center;
           align-items: center;
           color: red;
           transform: translate(150%,150%);
         }
         .box2 h2{
            opacity: 0.7;
              position: absolute;
           display: flex;
           height: 10vh;
           justify-content: center;
           align-items: center;
           color:green;
           transform: translate(70%,70%);
         }
          .box3 h3{
            opacity: 0.5;
              position: absolute;
           display: flex;
           height: 12vh;
           justify-content: center;
           align-items: center;
           font-size: 20px;
           color: blue;
           transform: translate(70%,70%);
         }
          .box4 h4{
            opacity: 0.6;
              position: absolute;
           display: flex;
           margin: 10px;
           font-size: 30px;
           justify-content: center;
           top: 50px;
           align-items: center;
           color: yellow;
           transform: translate(50%,50%);
         }
         
    </style>
</head>
<body>
    <div class="main">
        <div class="box1">
            <h1>WEB</h1><img src="./ccc.jpg" alt=""></div>
        <div class="box2">
            <h2>DEVOLPER</h2><img src="./dd.jpg" alt=""></div>
        <div class="box3">
            <h3>MUHAMMAD</h3><img src="./dfdf.jpg" alt=""></div>
        <div class="box4">
            <h4>TANVEER</h4><img src="./sdsd.jpg" alt=""></div>
    </div>
</body>
</html>
