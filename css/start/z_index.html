<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;padding: 0;box-sizing: border-box;
        }
        .box{
            position: relative;
            width: 500px;
            height: 300px;
            background-color: lightblue;
            z-index: 10;
        }
        .box2{
            position: absolute;
            top: 0;
            width: 500px;
            height: 400px;
            z-index: 9;
            background-color: lightcoral;
        }
        .box3{
            position: absolute;
            top: 0;
            width: 600px;
            height: 300px;
            z-index: 15;
            background-color: lightgreen;
        }
        .box4{
            z-index: 20;
            position: absolute;
            top: 0;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background-color: lightslategray;
        }
    </style>
</head>
<body>
    <div class="box"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
</body>
</html>
