<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .outer img{
            font-size: 50px;
            width: 100%;
            height: 500px;
            background-color: brown;
        }
        .box{
            position: fixed;
            width: 100%;
            height: 100px;
            background-color: blue;
        }
        .hero{
            width: 100pc;
            height: 500px;
            background-color: brown;
        }
        .block{
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50px;
            background-color: yellow;
        }
        .hero2{
              width: 100%;
            height: 600px;
            background-color:green;
        }
    </style>
</head>
<body>
    <div class="outer"><img src="./to-do-list-app.png" alt=""></div>
    <div class="box"></div>
    <div class="hero">
        <div class="block"></div>
    </div>
    <div class="hero2"></div>
</body>
</html>
