<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            position: relative;
            width: 100%;
            height: 100vh;
        }
        .hero{
            width: 100%;
            height: 150vh;
            background-color: lightblue;
        }
        .nav{
            position: fixed;
            width: 100%;
            height: 100px;
            background-color: crimson;
        }
    .outer{
            position: relative;
            bottom:30px ;
            width: 500px;
            height: 600px;
            background-color: crimson;
        }
        .box{
            position: absolute;
            bottom: 100px;
            right: 30px;
            width: 100px;
            height: 100px;
            border-radius: 50px;
            background-color: teal;
        }
    </style>
</head>
<body>

    <div class="nav"></div>
    <div class="hero"></div>

<div class="outer">
    <div class="box"></div>
</div>


</body>
</html>
