<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Editor by Js</title>
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="left">
        <div class="top"></div>
        <div class="bottom">
          <label for="image-input" class="btn">
            <input type="file" id="image-input" name="image-input" hidden />
            Upload Image
          </label>
          <button class="btn danger">Delete</button>
          <button class="btn success">Download</button>
        </div>
      </div>
      <div class="right">
        <div class="filters"></div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
