<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .box1{
            position: absolute ;
            width: 700px;
            height: 400px;
            background-color: blue;
            z-index: 5;
        }
        .box1 img{
           position: absolute;
           top: 50%;
           left: 50%;
           transform: translate(-50%,-50%);
            /* padding: 30px; */
            
        }
        .box2{
            position: absolute;
            width: 600px;
            height: 350px;
            background-color: red; 
            z-index: 6;
        }
        .box2 img{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
        }
        .box2 p{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: blue;
            font-size: 60px;
        }
    </style>
</head>
<body>
    <div class="box1 box"><img src="./dd.jpg" alt=""></div>
    <div class="box2 box"><img src="./dd.jpg " alt="">
    <p>Devolper</p></div>
    <div class="box3 box"></div>
    <div class="box4 box"></div>
    <div class="box5 box"></div>
</body>
</html>
