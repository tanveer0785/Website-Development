<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .box1{
            position: relative;
            margin: 20px;
            z-index: 10;
            width: 300px;
            height: 400px;
            background-color: lightblue;
        }
        .box2{
            position: absolute;
            top: 0;
            width: 400px;
            height: 400px;
            background-color: coral;
        }
        .box3{
            position: absolute;
            top: 0;
            z-index: 12;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background-color: tan;
        }
        .box4{
            position: absolute;
            top: 10px;
            left: 20px;
            z-index: 13;
            width: 100px;
            height: 80px;
            background-color: crimson;
        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
</body>
</html>
