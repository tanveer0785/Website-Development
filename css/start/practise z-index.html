<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .box{
            position: absolute;
            bottom: 250px;
            
            width: 300px;
            height: 300px;
            margin-left: 300px;
            
            background-color: blue;
        }
        .box2{
            position:absolute;
            top: 0;
            bottom: 400px;
            width: 300px;
            height: 300px;
            margin-left: 400px;
            background-color:gray;
        }
        .box3{
            position:relative;
            top: 0;
            bottom: 400px;
            width: 100px;
            height: 100px;
            margin-left: 400px;
            background-color:black;
        }
            
            
    </style>
</head>
<body>
    <div class="box"></div>
    <div class="box2"></div>
    <div class="box3"></div>
</body>
</html>
