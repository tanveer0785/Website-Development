    <title>Document</title>

            width: 100%;
            height: 100px;

        }
        .hero{

        }
        .outer{
            padding: 200px;
            width: 800px;
            height: 600px;

        }
        .box{
            width: 200px;
            height: 200px;
            background-color:red;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="nav"></div>
    <div class="hero"></div>
    
</div>
<div class="outer">

</html>
