<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2 style="color: blue;font-size: 50px;">Allow Maltiple Selections</h2>
    <p>
         Use the multiple attribute to allow the user to select more than one
      value.
    </p>
    <form action="./bub.html">
        <label for="Cars">Choose a Cars:</label>
        <select id="Cars"name="cars"size="4"Maltiple>
            <option value="Parado">Parado</option>
            <option value="Honda">Honda</option>
            <option value="Land">Land</option>
            <option value="Vivo">Vivo</option>
        </select><br><br>
        <input style="color: gold;" type ="submit">
    </form>
    <p style="color: red;font-style: italic;font-size: 30px;">
        Hold down the Ctrl (windows) / Command (Mac) button to select multiple options.
    </p>
</body>
</html>
