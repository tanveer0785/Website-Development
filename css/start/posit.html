<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            position: relative;
            width: 400px;
            height: 300px;
            background-color:fuchsia;
        }
        .box{
            width: 100px;
            height: 60px;
            position: absolute;
            bottom: 30px;
            left: 20px;
            background-color: turquoise;
            padding: 10px;

        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box">
            <h3>Devolper</h3>
        </div>
    </div>
    
</body>
</html>
